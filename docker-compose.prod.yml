# SERVER RUNTIME FILE
# Runs on the production server. References pre-built images that were
# loaded via `docker load` from a tarball shipped by scripts/build-and-ship.sh.
# The server never builds images.
#
# Mongo credentials come from /opt/go-participate/.env (compose variable
# substitution). App env comes from .env.production (runtime env).

services:
  mongodb:
    image: mongo:7
    container_name: gp-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db

  web:
    image: goparticipate/web:latest
    container_name: gp-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env.production
    depends_on:
      - mongodb

  admin:
    image: goparticipate/admin:latest
    container_name: gp-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    env_file: .env.production
    depends_on:
      - mongodb

  league:
    image: goparticipate/league:latest
    container_name: gp-league
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    env_file: .env.production
    depends_on:
      - mongodb

  dashboard:
    image: goparticipate/dashboard:latest
    container_name: gp-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:4003:4003"
    env_file: .env.production
    depends_on:
      - mongodb

  storefront:
    image: goparticipate/storefront:latest
    container_name: gp-storefront
    restart: unless-stopped
    ports:
      - "127.0.0.1:4004:4004"
    env_file: .env.production
    depends_on:
      - mongodb

volumes:
  mongodb_data:
