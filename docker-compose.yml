# Local development services for Go Participate
# Usage: docker compose up -d

services:
  mongodb:
    image: mongo:7
    container_name: goparticipate-mongodb
    restart: unless-stopped
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: goparticipate
      MONGO_INITDB_ROOT_PASSWORD: gp_dev
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
